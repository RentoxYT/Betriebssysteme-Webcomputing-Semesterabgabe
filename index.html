<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="css/main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Example</title>
  </head>
  <body>
<body>

  <div class="container mt-5">
    <div class="col-md-6 mx-auto">

      <form>

        <div class="row mb-3">
          <label for="Matrikelnummer" class="col-sm-4 col-form-label">
            Matrikelnummer
          </label>

          <div class="col-sm-8">
            <input type="number" class="form-control" id="Matrikelnummer">
          </div>
        </div>

        <div class="mb-3">
          <label for="studiengang">Studiengang</label>

          <select class="form-select" id="studiengang">
            <option selected>Studiengang...</option>
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="semester">Semester</label>

          <select class="form-select" id="semester">
            <option selected>Semester...</option>
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
          </select>
        </div>

        <fieldset class="mb-3">
          <legend>Studienart</legend>

          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="studienart"
                   id="bachelor"
                   checked>

            <label class="form-check-label" for="bachelor">
              Bachelor
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="studienart"
                   id="master">

            <label class="form-check-label" for="master">
              Master
            </label>
          </div>
        </fieldset>

        <div class="text-center">
          <button type="submit" class="btn btn-primary">
            Bestätigen
          </button>
        </div>

      </form>

    </div>
  </div>

</body>
    
  </body>
</html>
