<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="css/main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Example</title>
  </head>
  <body>
   <form>
  <div class="row mb-3">
   <label for="Matrikelnummer" class="col-sm-2 col-form-label">Matrikelnummer</label>
    <div class="col-sm-10">
      <input type="number" class="form-control" id="Matrikelnummer">
    </div>
  </div>
    <div class="col-12">
    <label  for="inlineFormSelectPref">Studiengang</label>
    <select class="form-select" id="inlineFormSelectPref">
      <option selected>Studiengang...</option>
      <option value="1">One</option>
      <option value="2">Two</option>
      <option value="3">Three</option>
    </select>
  </div>
    </div>
    <div class="col-12">
    <label for="inlineFormSelectPref">Semester</label>
    <select class="form-select" id="inlineFormSelectPref">
      <option selected>Semester...</option>
      <option value="1">One</option>
      <option value="2">Two</option>
      <option value="3">Three</option>
    </select>
  </div>
  <fieldset class="row mb-3">
    <legend class="col-form-label col-sm-2 pt-0">Radios</legend>
    <div class="col-sm-10">
      <div class="form-check">
        <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="option1" checked>
        <label class="form-check-label" for="gridRadios1">
          Bachelor
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="option2">
        <label class="form-check-label" for="gridRadios2">
          Bachelor
        </label>
      </div>
      <div class="form-check disabled">
    </div>
  </fieldset>
  <button type="submit" class="btn btn-primary">Bestätigen</button>
</form>
    
  </body>
</html>
