<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="css/main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Example</title>
  </head>
  <body>


  <div class="container mt-5">
    <div class="col-md-6 mx-auto">

     <form action="../cgi-bin/projekt.cgi" method="post">

        <div class="row mb-3">
          <label for="Matrikelnummer" class="col-sm-4 col-form-label">
            Matrikelnummer
          </label>

          <div class="col-sm-8">
            <input type="number" class="form-control" id="Matrikelnummer" name="Matrikelnummer">
          </div>
        </div>

        <div class="mb-3">
          <label for="studiengang">Studiengang</label>

          <select class="form-select" id="Studiengang", name="Studiengang">
            <option selected>Studiengang...</option>
            <option value="Informatik">Informatik</option>
            <option value="Medieninformatik">Medieninformatik</option>
            <option value="Wirtschaftsinformatik">Wirtschaftsinformatik</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="semester">Semester</label>

          <select class="form-select" id="Semester", name"Semester">
            <option selected>Semester...</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
 	    <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>  
	</select>
        </div>

        <fieldset class="mb-3">
          <legend>Studienart</legend>

          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="studienart"
                   id="bachelor"
                   checked>

            <label class="form-check-label" for="bachelor">
              Bachelor
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="studienart"
                   id="master">

            <label class="form-check-label" for="master">
              Master
            </label>
          </div>
        </fieldset>

        <div class="text-center">
          <button type="submit" class="btn btn-primary">
            Bestätigen
          </button>
        </div>

      </form>

    </div>
  </div>
<footer class="bg-body-tertiary text-center mt-auto">
  <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.05);">
   GitHub Paul Sohnrey & Vanessa Folte:
    <a class="text-reset fw-bold" href="https://github.com/RentoxYT/Betriebssysteme-Webcomputing-Semesterabgabe">Repository
  </div>
 </footer>

</body>

</html>
